<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sedam TAG 2026 - Auditoria</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
.card { background-color: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-section" class="flex items-center justify-center min-h-screen">
<div class="card p-10 rounded-3xl w-full max-w-md shadow-2xl">
<h2 class="text-3xl font-bold mb-8 text-center text-blue-400">Sedam TAG 2026</h2>
<input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-800 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
<input type="password" id="password" placeholder="Senha" class="w-full p-4 mb-6 bg-slate-800 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
<button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition-all shadow-lg">Entrar</button>
</div>
</div>
<!-- DASHBOARD -->
<div id="dashboard-section" class="hidden p-8 max-w-7xl mx-auto">
<div class="flex justify-between items-center mb-12">
<h1 class="text-4xl font-bold">Monitoramento TAG 2026</h1>
<button onclick="logout()" class="text-red-400 hover:text-red-300 font-semibold">Sair</button>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
<div class="lg:col-span-2 card p-8 rounded-3xl min-h-[400px]">
<h3 class="text-xl font-bold mb-6">Evolução Mensal Acumulada</h3>
<canvas id="graficoEvolucao"></canvas>
</div>
<div class="card p-8 rounded-3xl">
<h3 class="text-xl font-bold mb-6 text-green-400">Lançar Percentual</h3>
<input type="month" id="mes_ref" class="w-full p-4 mb-4 bg-slate-800 rounded-xl border-none">
<input type="number" id="perc_mes" placeholder="%" class="w-full p-4 mb-6 bg-slate-800 rounded-xl border-none">
<button onclick="lancarDados()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold transition-all">Salvar Lançamento</button>
</div>
</div>
<div id="lista-delib" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>
<script>
// CONFIGURAÇÃO SUPABASE - EDITE ESTES DOIS CAMPOS
        const SUPABASE_URL = 'https://zvtzbiqfwhggysiuiuxh.supabase.co/rest/v1/';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dHpiaXFmd2hnZ3lzaXVpdXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODYyMjcsImV4cCI6MjA5MzE2MjIyN30.tCnFZv2B6Kmd9KsyZM8CHClZqsq7Nyu-8nxyYVs_ZMQ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let meuPerfil = null;
let chartInstance = null;
async function fazerLogin() {
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
const { data, error } = await supabase.auth.signInWithPassword({ email, password });
if(error) alert("Erro: " + error.message);
else carregarPerfil(data.user.id);
}
async function carregarPerfil(userId) {
const { data } = await supabase.from('perfis').select('*').eq('id', userId).single();
meuPerfil = data;
document.getElementById('login-section').classList.add('hidden');
document.getElementById('dashboard-section').classList.remove('hidden');
carregarDados();
}
async function carregarDados() {
let query = supabase.from('deliberacoes').select('*, perfis(nome_completo)');
if(meuPerfil.nivel_acesso === 'Coordenador') query = query.eq('responsavel_id', meuPerfil.id);
const { data } = await query;
exibirDeliberações(data);
carregarGrafico();
}
function exibirDeliberações(delibs) {
const container = document.getElementById('lista-delib');
container.innerHTML = delibs.map(d => `
<div class="card p-6 rounded-2xl">
<div class="flex justify-between items-start mb-4">
<span class="text-blue-400 font-bold">${d.identificador}</span>
<span class="text-sm text-slate-400">${d.prazo}</span>
</div>
<p class="text-sm mb-4 leading-relaxed">${d.descricao}</p>
<div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
<div class="bg-blue-500 h-full" style="width: ${d.total_cumprimento}%"></div>
</div>
<div class="mt-2 text-right font-bold">${d.total_cumprimento}%</div>
</div>`).join('');
}
async function carregarGrafico() {
const { data } = await supabase.from('evolucao_mensal').select('*').order('mes_referencia', { ascending: true });
const ctx = document.getElementById('graficoEvolucao').getContext('2d');
if(chartInstance) chartInstance.destroy();
chartInstance = new Chart(ctx, {
type: 'line',
data: { labels: data.map(d => d.mes_referencia), datasets: [{ label: 'Evolução %', data: data.map(d => d.percentual_lancado), borderColor: '#3b82f6', tension: 0.3 }] },
options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
});
}
async function logout() { await supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
