<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedam TAG 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen text-gray-100 antialiased">

    <!-- Tela de Login -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-2xl max-w-md w-full border border-white/20">
            <h1 class="text-4xl font-bold text-white mb-8 text-center bg-gradient-to-r from-blue-400 to-blue-200 bg-clip-text text-transparent">Sedam TAG 2026</h1>
            <form id="loginForm">
                <input type="email" id="userEmail" placeholder="Email" class="w-full p-4 mb-6 bg-white/20 text-white placeholder-white/60 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 transition-all text-lg font-medium">
                <input type="password" id="userPass" placeholder="Senha" class="w-full p-4 mb-8 bg-white/20 text-white placeholder-white/60 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 transition-all text-lg font-medium">
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-4 px-8 rounded-2xl text-lg shadow-xl transition-all transform hover:scale-105">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Geral -->
    <div id="generalDashboard" class="hidden min-h-screen">
        <nav class="bg-slate-800/50 backdrop-blur-xl border-b border-white/10 p-6">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-blue-200 bg-clip-text text-transparent">Dashboard Geral</h1>
                <button class="logout-btn bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">Sair</button>
            </div>
        </nav>
        <main class="p-8 max-w-7xl mx-auto space-y-8">
            <div class="flex flex-col lg:flex-row gap-6">
                <select id="coordFilter" class="flex-1 bg-white/20 backdrop-blur-xl p-5 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 text-white font-semibold text-lg">
                    <option value="">Selecione Coordenador</option>
                </select>
                <select id="monthFilter" class="flex-1 bg-white/20 backdrop-blur-xl p-5 rounded-2xl border-0 focus:ring-4 focus:ring-blue-500/50 text-white font-semibold text-lg">
                    <option value="">Selecione Mês</option>
                </select>
            </div>
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
                <canvas id="chartCanvas"></canvas>
            </div>
            <div id="delibsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <!-- Painel Individual Coordenador -->
    <div id="coordPanel" class="hidden min-h-screen">
        <nav class="bg-slate-800/50 backdrop-blur-xl border-b border-white/10 p-6">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 id="coordTitle" class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-blue-200 bg-clip-text text-transparent">Painel Individual do Coordenador</h1>
                <button class="logout-btn bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">Sair</button>
            </div>
        </nav>
        <main class="p-8 max-w-7xl mx-auto space-y-8">
            <p class="text-xl text-blue-200 font-medium">Lançamento do percentual do mês atual (<span id="currentMonthDisplay">Maio</span>)</p>
            <div id="coordDelibs" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
            <button id="saveProgress" class="mx-auto block bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white font-bold py-4 px-12 rounded-2xl text-xl shadow-xl transition-all transform hover:scale-105">Salvar Progresso do Mês</button>
        </main>
    </div>

    <script>
        // Configurações globais
        const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const monthOrder = months.reduce((acc, month, idx) => { acc[month] = idx; return acc; }, {});
        const currentMonth = 'Mai';
        const prevMonth = 'Abr';
        let appData;
        let currentUser = null;
        let evolutionChart = null;

        // Usuários mock
        const users = {
            'auditor@sedam.com': { role: 'general', pass: 'pass123' },
            'diretor@sedam.com': { role: 'general', pass: 'pass123' },
            'coord1@sedam.com': { role: 'coord', coordId: 'coord1', pass: 'pass123' }
        };

        // Inicializar dados
        function initData() {
            if (!localStorage.getItem('sedamData')) {
                const coordNames = {
                    'coord1': 'João Silva',
                    'coord2': 'Maria Oliveira'
                };
                const delibs = {};
                ['coord1', 'coord2'].forEach(coordId => {
                    delibs[coordId] = [];
                    const monthlyData = coordId === 'coord1' ? { Mar: 30, Abr: 20 } : { Mar: 10, Abr: 40 };
                    for (let i = 1; i <= 10; i++) {
                        delibs[coordId].push({
                            id: i,
                            title: `Deliberação ${i.toString().padStart(2, '0')} - ${coordNames[coordId]}`,
                            monthly: { ...monthlyData }
                        });
                    }
                });
                appData = { coordNames, delibs };
                localStorage.setItem('sedamData', JSON.stringify(appData));
            } else {
                appData = JSON.parse(localStorage.getItem('sedamData'));
            }
        }

        // Calcular acumulado até mês específico
        function getCumulative(deliberation, upToMonth) {
            const upToIdx = monthOrder[upToMonth];
            let cum = 0;
            for (let i = 0; i <= upToIdx; i++) {
                const monthKey = months[i];
                cum += (deliberation.monthly[monthKey] || 0);
            }
            return Math.min(cum, 100);
        }

        // Logout
        function logout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('generalDashboard').classList.add('hidden');
            document.getElementById('coordPanel').classList.add('hidden');
            currentUser = null;
            if (evolutionChart) {
                evolutionChart.destroy();
                evolutionChart = null;
            }
        }

        // Popular filtros
        function populateFilters() {
            const coordSel = document.getElementById('coordFilter');
            coordSel.innerHTML = '<option value="">Selecione Coordenador</option>' +
                Object.entries(appData.coordNames).map(([id, name]) =>
                    `<option value="${id}">${name}</option>`
                ).join('');
            const monthSel = document.getElementById('monthFilter');
            monthSel.innerHTML = '<option value="">Selecione Mês</option>' +
                months.map((m, i) => `<option value="${i}">${m}</option>`).join('');
        }

        // Atualizar dashboard geral
        function updateDashboard() {
            const coordId = document.getElementById('coordFilter').value;
            const monthIdx = parseInt(document.getElementById('monthFilter').value) || 0;
            const selectedMonth = months[monthIdx];
            if (!coordId || monthIdx === 0) return;

            // Gráfico
            const labels = months.slice(0, monthIdx + 1);
            const dataPoints = labels.map(m => {
                let totalCum = 0;
                appData.delibs[coordId].forEach(d => {
                    totalCum += getCumulative(d, m);
                });
                return (totalCum / appData.delibs[coordId].length).toFixed(1);
            });

            if (evolutionChart) evolutionChart.destroy();
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            evolutionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Evolução Acumulada (%)',
                        data: dataPoints,
                        borderColor: 'rgb(59 130 246)',
                        backgroundColor: 'rgba(59 130 246 0.2)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: 'rgb(59 130 246)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(59 130 246)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    }
                }
            });

            // Lista de deliberações
            const listCont = document.getElementById('delibsList');
            listCont.innerHTML = '';
            appData.delibs[coordId].forEach(delib => {
                const cum = getCumulative(delib, selectedMonth);
                const card = `
                    <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl border border-white/20 hover:bg-white/20 transition-all shadow-xl hover:shadow-2xl">
                        <h3 class="text-xl font-bold text-white mb-3 truncate">${delib.title}</h3>
                        <div class="w-full bg-gray-700/50 rounded-xl h-4 mb-3 overflow-hidden">
                            <div class="bg-gradient-to-r from-blue-500 to-blue-400 h-4 rounded-xl transition-all duration-500 shadow-md" style="width: ${cum}%"></div>
                        </div>
                        <div class="text-2xl font-mono font-bold text-blue-300">${cum.toFixed(1)}%</div>
                    </div>
                `;
                listCont.insertAdjacentHTML('beforeend', card);
            });
        }

        // Popular painel coordenador
        function populateCoordPanel(coordId) {
            document.getElementById('coordTitle').textContent = `Painel Individual - ${appData.coordNames[coordId]}`;
            document.getElementById('currentMonthDisplay').textContent = currentMonth;
            const container = document.getElementById('coordDelibs');
            container.innerHTML = '';
            const delibs = appData.delibs[coordId];
            delibs.forEach((delib, idx) => {
                const prevCum = getCumulative(delib, prevMonth);
                const card = `
                    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 shadow-xl hover:shadow-2xl transition-all">
                        <h3 class="text-2xl font-bold text-white mb-4">${delib.title}</h3>
                        <div class="w-full bg-gray-700/50 rounded-2xl h-5 mb-6 overflow-hidden">
                            <div class="bg-gradient-to-r from-emerald-500 to-emerald-400 h-5 rounded-xl transition-all duration-500 shadow-lg" style="width: ${prevCum}%"></div>
                        </div>
                        <div class="text-xl text-white mb-4 font-semibold">Acumulado até ${prevMonth}: <span class="text-blue-300 font-bold text-2xl">${prevCum.toFixed(0)}%</span></div>
                        <label class="block text-white text-lg font-medium mb-3">Incremento ${currentMonth} (%):</label>
                        <input type="number" id="input-${delib.id}" min="0" max="100" step="0.5" value="0" class="w-full p-4 bg-white/20 text-white text-xl rounded-2xl border-0 focus:ring-4 focus:ring-emerald-500/50 font-mono tracking-wider">
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        // Eventos
        document.addEventListener('DOMContentLoaded', () => {
            initData();

            // Login
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('userEmail').value.trim();
                const pass = document.getElementById('userPass').value;
                if (users[email] && users[email].pass === pass) {
                    currentUser = users[email];
                    document.getElementById('loginScreen').classList.add('hidden');
                    if (currentUser.role === 'general') {
                        document.getElementById('generalDashboard').classList.remove('hidden');
                        populateFilters();
                        document.getElementById('coordFilter').addEventListener('change', updateDashboard);
                        document.getElementById('monthFilter').addEventListener('change', updateDashboard);
                    } else {
                        document.getElementById('coordPanel').classList.remove('hidden');
                        populateCoordPanel(currentUser.coordId);
                    }
                } else {
                    alert('Credenciais inválidas!');
                }
            });

            // Logout buttons
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('logout-btn')) {
                    logout();
                }
            });

            // Salvar progresso coordenador
            document.getElementById('saveProgress').addEventListener('click', () => {
                const coordId = currentUser.coordId;
                const delibs = appData.delibs[coordId];
                let savedCount = 0;
                delibs.forEach(delib => {
                    const input = document.getElementById(`input-${delib.id}`);
                    if (input) {
                        const val = parseFloat(input.value);
                        if (!isNaN(val) && val >= 0 && val <= 100) {
                            delib.monthly[currentMonth] = val;
                            savedCount++;
                        }
                    }
                });
                localStorage.setItem('sedamData', JSON.stringify(appData));
                populateCoordPanel(coordId);
                alert(`${savedCount} deliberações atualizadas com sucesso!`);
            });
        });
    </script>
</body>
</html>
